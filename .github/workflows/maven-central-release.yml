name: Release to Maven Central

# Manual release to Maven Central using Central Portal / OSSRH.
# Requires GPG secret key, passphrase, and Central token configured in repository secrets.

on:
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests during deployment build'
        required: false
        default: true
        type: boolean

jobs:
  publish:
    name: Release to Maven Central
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_SECRET_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Build and Publish to Maven Central
        run: |
          mvn -B clean deploy \
            -DskipTests=${{ inputs.skip_tests }} \
            -Dspotbugs.skip=true \
            -Dpmd.skip=true \
            -P release
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
