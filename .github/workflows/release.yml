name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build, Publish & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write    # create GitHub releases
      packages: write    # publish to GitHub Packages

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Extract version from tag
        id: tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify pom.xml version matches tag
        run: |
          POM_VERSION=$(mvn help:evaluate -Dexpression=revision -q -DforceStdout)
          TAG_VERSION="${{ steps.tag.outputs.VERSION }}"
          echo "pom.xml revision : $POM_VERSION"
          echo "Tag version       : $TAG_VERSION"
          if [ "$POM_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::pom.xml version ($POM_VERSION) does not match tag ($TAG_VERSION). Run scripts/release.sh to create a proper release tag."
            exit 1
          fi

      - name: Build and verify (SpotBugs + PMD)
        run: mvn -B verify

      - name: Publish to GitHub Packages
        run: |
          mvn -B deploy \
            -DskipTests \
            -DaltDeploymentRepository=github::https://maven.pkg.github.com/${{ github.repository }} \
            -s "$GITHUB_WORKSPACE/settings.xml"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Agent Core ${{ github.ref_name }}" \
            --generate-notes \
            --latest
