name: Release

# Triggered manually from GitHub Actions UI.
# Go to: Actions → Release → Run workflow → pick bump type → Run.
#
# What this does (fully automated, zero local steps):
#   1. Reads current version from pom.xml  (e.g. 1.0.4-SNAPSHOT)
#   2. Strips -SNAPSHOT                    (→ 1.0.4)
#   3. Builds & verifies (SpotBugs + PMD)
#   4. Publishes release artifact to Maven Central  (skip if re-running after partial failure)
#   5. Commits release version to main
#   6. Tags  v1.0.4
#   7. Bumps pom.xml to next SNAPSHOT      (→ 1.0.5-SNAPSHOT)
#   8. Rebases on any commits that landed during the build, pushes
#   9. Creates GitHub Release with auto-generated notes

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      skip_publish:
        description: 'Skip artifact publish (use when re-running after a partial failure where artifact was already published)'
        required: false
        default: false
        type: boolean

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    name: Bump → Build → Publish → Release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push commits + tags, create GitHub Release

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git bot identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_SECRET_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      # ── Compute versions ────────────────────────────────────────────────
      - name: Compute release and next-SNAPSHOT versions
        id: ver
        run: |
          CURRENT=$(mvn help:evaluate -Dexpression=revision -q -DforceStdout)

          if [[ "$CURRENT" != *"-SNAPSHOT" ]]; then
            echo "::error::pom.xml revision is '$CURRENT' — expected a -SNAPSHOT. Aborting."
            exit 1
          fi

          RELEASE=${CURRENT%-SNAPSHOT}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$RELEASE"

          BUMP_TYPE="${{ inputs.bump_type }}"
          if [ -z "$BUMP_TYPE" ]; then
            BUMP_TYPE="patch"
          fi

          case "$BUMP_TYPE" in
            major) NEXT="$((MAJOR + 1)).0.0-SNAPSHOT" ;;
            minor) NEXT="${MAJOR}.$((MINOR + 1)).0-SNAPSHOT" ;;
            patch) NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))-SNAPSHOT" ;;
            *)
              echo "::error::Invalid bump type '$BUMP_TYPE'."
              exit 1
              ;;
          esac

          echo "release=$RELEASE"  >> "$GITHUB_OUTPUT"
          echo "next=$NEXT"        >> "$GITHUB_OUTPUT"
          echo "tag=v${RELEASE}"   >> "$GITHUB_OUTPUT"

          echo "Current version  : $CURRENT"
          echo "Release version  : $RELEASE"
          echo "Next dev version : $NEXT"

      # ── Set pom.xml to release version ─────────────────────────────────
      - name: Set pom.xml → ${{ steps.ver.outputs.release }}
        run: |
          sed -i "s|<revision>.*</revision>|<revision>${{ steps.ver.outputs.release }}</revision>|" pom.xml

      # ── Build & verify ───────────────────────────────────────────────────
      - name: Build and verify (SpotBugs + PMD)
        run: mvn -B verify

      # ── Publish artifact ─────────────────────────────────────────────────
      - name: Validate publishing secrets
        if: ${{ inputs.skip_publish != true }}
        run: |
          missing=0
          for name in MAVEN_USERNAME MAVEN_PASSWORD MAVEN_GPG_PASSPHRASE; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is empty. Configure OSSRH_USERNAME, OSSRH_TOKEN, and GPG_PASSPHRASE repository secrets before publishing."
              missing=1
            fi
          done
          if [ -z "${GPG_SECRET_KEY_SET}" ]; then
            echo "::error::GPG_SECRET_KEY is empty. Configure the ASCII-armored private key as a repository secret."
            missing=1
          fi
          exit "$missing"
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_SECRET_KEY_SET: ${{ secrets.GPG_SECRET_KEY }}

      - name: Publish ${{ steps.ver.outputs.release }} to Maven Central
        if: ${{ inputs.skip_publish != true }}
        run: |
          mvn -B clean deploy \
            -DskipTests \
            -Dspotbugs.skip=true \
            -Dpmd.skip=true \
            -P release
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Skip publish (artifact already published)
        if: ${{ inputs.skip_publish == true }}
        run: echo "Skipping publish — artifact ${{ steps.ver.outputs.release }} was already published."

      # ── Commit, tag, bump, push ──────────────────────────────────────────
      - name: Commit release, tag, bump to next SNAPSHOT, push
        run: |
          RELEASE="${{ steps.ver.outputs.release }}"
          NEXT="${{ steps.ver.outputs.next }}"
          TAG="${{ steps.ver.outputs.tag }}"

          # Commit release version
          git add pom.xml
          git commit -m "chore: prepare release ${RELEASE}"

          # Tag at release commit
          git tag -a "${TAG}" -m "Release ${RELEASE}"

          # Bump to next dev SNAPSHOT
          sed -i "s|<revision>.*</revision>|<revision>${NEXT}</revision>|" pom.xml
          git add pom.xml
          git commit -m "chore: prepare next development iteration ${NEXT} [skip ci]"

          # Rebase on any commits that landed during the build, then push
          git pull --rebase origin main
          git push origin main
          git push origin "${TAG}"

      # ── Create GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release ${{ steps.ver.outputs.tag }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            --title "${{ steps.ver.outputs.tag }}" \
            --generate-notes \
            --latest
